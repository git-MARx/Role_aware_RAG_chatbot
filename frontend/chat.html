<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HR Chatbot</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #4f46e5;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    header h1 { font-size: 18px; font-weight: 600; }

    header button {
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s;
    }

    header button:hover { background: rgba(255,255,255,0.25); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .bubble.user {
      align-self: flex-end;
      background: #4f46e5;
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .bubble.bot {
      align-self: flex-start;
      background: #fff;
      color: #1a1a1a;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .bubble.typing {
      align-self: flex-start;
      background: #fff;
      color: #999;
      font-style: italic;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      border-bottom-left-radius: 4px;
    }

    #input-area {
      background: #fff;
      padding: 14px 16px;
      display: flex;
      gap: 10px;
      border-top: 1px solid #e5e7eb;
    }

    #message-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
    }

    #message-input:focus { border-color: #4f46e5; }

    #send-btn {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    #send-btn:hover { background: #4338ca; }
    #send-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    .bubble.bot table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 6px;
      font-size: 13px;
    }

    .bubble.bot th, .bubble.bot td {
      border: 1px solid #e5e7eb;
      padding: 6px 10px;
      text-align: left;
    }

    .bubble.bot th { background: #f3f4f6; font-weight: 600; }
    .bubble.bot tr:nth-child(even) td { background: #fafafa; }

    .bubble.bot p { margin-bottom: 6px; }
    .bubble.bot ul, .bubble.bot ol { padding-left: 18px; margin-bottom: 6px; }
    .bubble.bot strong { font-weight: 600; }
    .bubble.bot code { background: #f3f4f6; padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  </style>
</head>
<body>
  <header>
    <h1>HR Chatbot</h1>
    <div style="display:flex; align-items:center; gap:12px;">
      <span id="emp-label" style="font-size:13px; opacity:0.85;"></span>
      <button onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div id="messages"></div>

  <div id="input-area">
    <input
      type="text"
      id="message-input"
      placeholder="Ask about your leave, payslip, or company policy…"
      autocomplete="off"
    />
    <button id="send-btn" onclick="sendMessage()">&#10148;</button>
  </div>

  <script>
    const token = localStorage.getItem("session_token");
    if (!token) window.location.href = "/";

    const empId = localStorage.getItem("emp_id");
    const name  = localStorage.getItem("name");
    if (empId) document.getElementById("emp-label").textContent = `${name} (#${empId})`;

    function appendBubble(text, role) {
      const div = document.createElement("div");
      div.className = `bubble ${role}`;
      if (role === "bot") {
        div.innerHTML = marked.parse(text);
      } else {
        div.textContent = text;
      }
      document.getElementById("messages").appendChild(div);
      div.scrollIntoView({ behavior: "smooth" });
      return div;
    }

    async function sendMessage() {
      const input = document.getElementById("message-input");
      const btn   = document.getElementById("send-btn");
      const text  = input.value.trim();
      if (!text) return;

      input.value = "";
      input.disabled = true;
      btn.disabled   = true;

      appendBubble(text, "user");
      const typing = appendBubble("Thinking…", "typing");

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type":  "application/json",
            "Authorization": `Bearer ${token}`,
          },
          body: JSON.stringify({ message: text }),
        });

        const data = await res.json();
        typing.remove();

        if (res.status === 401) {
          localStorage.removeItem("session_token");
          window.location.href = "/";
          return;
        }

        appendBubble(data.response || "Sorry, something went wrong.", "bot");
      } catch (e) {
        typing.remove();
        appendBubble("Unable to reach the server. Please try again.", "bot");
      } finally {
        input.disabled = false;
        btn.disabled   = false;
        input.focus();
      }
    }

    async function logout() {
      await fetch("/auth/logout", {
        method: "POST",
        headers: { "Authorization": `Bearer ${token}` },
      });
      localStorage.removeItem("session_token");
      window.location.href = "/";
    }

    document.getElementById("message-input").addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
